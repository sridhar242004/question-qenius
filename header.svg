<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="100%" style="max-width: 1200px;">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#231f1d"/>
    </linearGradient>

    <!-- Animated text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c2410c">
        <animate attributeName="stop-color" values="#c2410c;#d4a373;#0d7377;#c2410c" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#d4a373">
        <animate attributeName="stop-color" values="#d4a373;#0d7377;#c2410c;#d4a373" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0d7377">
        <animate attributeName="stop-color" values="#0d7377;#c2410c;#d4a373;#0d7377" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Stronger glow for accents -->
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Mask for text reveal -->
    <mask id="textMask">
      <rect x="0" y="0" width="1200" height="340" fill="white"/>
      <rect x="0" y="0" width="0" height="340" fill="black">
        <animate attributeName="width" from="0" to="1200" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
      </rect>
    </mask>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bgGrad)" rx="16"/>
  <rect width="1200" height="340" fill="url(#grid)" rx="16"/>

  <!-- Animated corner accents -->
  <g opacity="0.6">
    <!-- Top-left corner bracket -->
    <path d="M 40 80 L 40 40 L 80 40" fill="none" stroke="#c2410c" stroke-width="2" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" from="0 200" to="200 0" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </path>
    <!-- Top-right corner bracket -->
    <path d="M 1120 40 L 1160 40 L 1160 80" fill="none" stroke="#c2410c" stroke-width="2" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" from="0 200" to="200 0" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </path>
    <!-- Bottom-left corner bracket -->
    <path d="M 80 300 L 40 300 L 40 260" fill="none" stroke="#0d7377" stroke-width="2" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" from="0 200" to="200 0" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" begin="1s"/>
    </path>
    <!-- Bottom-right corner bracket -->
    <path d="M 1160 260 L 1160 300 L 1120 300" fill="none" stroke="#0d7377" stroke-width="2" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" from="0 200" to="200 0" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    </path>
  </g>

  <!-- Floating particles -->
  <g fill="#c2410c" opacity="0.4">
    <circle cx="200" cy="100" r="3" filter="url(#glow)">
      <animate attributeName="cy" values="100;80;100" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="200" r="2" filter="url(#glow)">
      <animate attributeName="cy" values="200;220;200" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="250" r="2.5" fill="#0d7377" filter="url(#glow)">
      <animate attributeName="cx" values="150;170;150" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="120" r="3" fill="#d4a373" filter="url(#glow)">
      <animate attributeName="cx" values="1050;1030;1050" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Animated horizontal lines -->
  <line x1="100" y1="170" x2="300" y2="170" stroke="#c2410c" stroke-width="1" opacity="0.3">
    <animate attributeName="x2" from="100" to="300" dur="1s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite" begin="1s"/>
  </line>
  <line x1="900" y1="170" x2="1100" y2="170" stroke="#0d7377" stroke-width="1" opacity="0.3">
    <animate attributeName="x1" from="1100" to="900" dur="1s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite" begin="1.2s"/>
  </line>

  <!-- Main title: QuestionGenius -->
  <g mask="url(#textMask)">
    <text x="600" y="155" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="url(#textGrad)" filter="url(#glow)">
      QuestionGenius
      <animate attributeName="opacity" from="0" to="1" dur="0.8s" fill="freeze"/>
    </text>
  </g>

  <!-- Subtitle tagline -->
  <text x="600" y="210" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="400" fill="#a8a29e" letter-spacing="3">
    <tspan opacity="0">
      TRANSFORM ANY DOCUMENT INTO EXAM-READY QUESTIONS
      <animate attributeName="opacity" from="0" to="1" dur="1s" begin="1.2s" fill="freeze"/>
    </tspan>
  </text>

  <!-- Speed badge -->
  <g transform="translate(600, 260)">
    <rect x="-90" y="-18" width="180" height="36" rx="18" fill="rgba(194,65,12,0.12)" stroke="#c2410c" stroke-width="1" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.8s" fill="freeze"/>
    </rect>
    <text x="0" y="5" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" font-weight="600" fill="#c2410c" opacity="0">
      <tspan>&lt; 2s INFERENCE</tspan>
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="2s" fill="freeze"/>
    </text>
    <!-- Pulse ring -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="#c2410c" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0.6;0" dur="2s" repeatCount="indefinite" begin="2.5s"/>
      <animate attributeName="r" values="18;40" dur="2s" repeatCount="indefinite" begin="2.5s"/>
    </circle>
  </g>

  <!-- Bottom decorative dots -->
  <g transform="translate(600, 310)">
    <circle cx="-20" cy="0" r="3" fill="#57534e" opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" dur="0.4s" begin="2.2s" fill="freeze"/>
    </circle>
    <circle cx="0" cy="0" r="3" fill="#57534e" opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" dur="0.4s" begin="2.4s" fill="freeze"/>
    </circle>
    <circle cx="20" cy="0" r="3" fill="#57534e" opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" dur="0.4s" begin="2.6s" fill="freeze"/>
    </circle>
  </g>
</svg>